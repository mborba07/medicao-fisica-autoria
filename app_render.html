  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nsition:all .15s;\n}\n.btn:hover{border-color:var(--bd3);color:var(--tx);background:var(--sf3)}\n.btn svg{width:13px;height:13px}\n.btn-prim{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}\n.btn-prim:hover{background:#3a6df0;border-color:#3a6df0;color:#fff}\n\n/* ═════════════ KPIs ═════════════ */\n.kpis{\n  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;\n  margin-bottom:14px;\n}\n@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}\n.kpi{\n  background:var(--sf1);\n  border:1px solid var(--bd);\n  border-radius:var(--r-m);\n  padding:14px 16px;\n  position:relative;overflow:hidden;\n  transition:border-color .2s;\n  box-shadow:0 10px 24px -22px rgba(0,0,0,.65);\n}\n.kpi::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:var(--ac);opacity:.75}\n.kpi.neg::before{background:var(--neg)}.kpi.pos::before{background:var(--pos)}.kpi.warn::before{background:var(--warn)}.kpi.vio::before{background:var(--vio)}\n.kpi:hover{border-color:var(--bd2)}\n.kpi-tag{\n  display:flex;align-items:center;gap:6px;\n  font-size:10px;font-family:var(--mono);font-weight:500;\n  letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);\n  margin-bottom:9px;\n}\n.kpi-tag .accent{\n  width:6px;height:6px;border-radius:99px;flex-shrink:0;\n  background:var(--ac);\n}\n.kpi.neg .kpi-tag .accent{background:var(--neg)}\n.kpi.vio .kpi-tag .accent{background:var(--vio)}\n.kpi.warn .kpi-tag .accent{background:var(--warn)}\n.kpi.pos .kpi-tag .accent{background:var(--pos)}\n\n.kpi-val{\n  font-family:var(--mono);font-size:24px;font-weight:600;\n  color:var(--tx);line-height:1.05;\n  letter-spacing:-.02em;\n  display:flex;align-items:baseline;gap:5px;\n}\n.kpi-val .pfx{font-size:13px;color:var(--tx3);font-weight:500}\n.kpi-val.neg{color:var(--neg2)}\n.kpi-val.pos{color:var(--pos2)}\n.kpi-val.vio{color:#c89dff}\n.kpi-val.warn{color:var(--warn)}\n.kpi-val .cat-name{font-family:var(--sans);font-size:16px;letter-spacing:-.01 letter-spacing:.04em;text-transform:uppercase;color:var(--tx3);\n  transition:all .15s;\n}\n.sit-btn:hover{color:var(--tx)}\n.sit-btn.on{background:var(--ac-w);border-color:var(--ac-bd);color:var(--ac2);font-weight:600}\n\n.btn-add{\n  padding:11px;border-radius:var(--r-s);\n  background:linear-gradient(135deg,var(--ac) 0%,#3a6df0 100%);\n  color:#fff;font-size:13px;font-weight:600;letter-spacing:.01em;\n  display:flex;align-items:center;justify-content:center;gap:7px;\n  transition:all .15s;box-shadow:0 4px 18px -6px var(--ac);\n  margin-top:4px;\n}\n.btn-add:hover{filter:brightness(1.1)}\n.btn-add:disabled{opacity:.4;cursor:not-allowed;filter:none;box-shadow:none}\n.btn-add svg{width:14px;height:14px}\n\n.cad-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}\n.cad-mini .kpi{padding:12px 14px}\n.cad-mini .kpi-val{font-size:18px}\n\n/* ═════════════ TOAST ═════════════ */\n#toast{\n  position:fixed;bottom:18px;right:18px;\n  padding:11px 16px;border-radius:var(--r-s);\n  background:var(--sf3);border:1px solid var(--bd2);\n  color:var(--tx);font-family:var(--mono);font-size:12px;font-weight:500;\n  display:flex;align-items:center;gap:8px;\n  opacity:0;transform:translateY(8px);\n  transition:all .25s cubic-bezier(.4,0,.2,1);\n  pointer-events:none;z-index:9999;\n  box-shadow:0 10px 40px -10px rgba(0,0,0,.5);\n  max-width:380px;\n}\n#toast.show{opacity:1;transform:translateY(0)}\n#toast.ok{border-color:rgba(77,216,154,.35);background:var(--pos-w);color:var(--pos2)}\n#toast.err{border-color:rgba(255,92,122,.35);background:var(--neg-w);color:var(--neg2)}\n\n/* hide number arrows */\ninput[type=\"number\"]::-webkit-outer-spin-button,input[type=\"number\"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}\ninput[type=\"number\"]{-moz-appearance:textfield}\n</style>\n</head>\n<body>\n\n<div class=\"shell\" id=\"shell\">\n\n  <!-- TOPBAR -->\n  <header class=\"topbar\">\n    <div class=\"brand\">\n      <div class=\"brand-mark\" aria-hidden=\"true\">\n        <svg viewBox=\"0 0 32 32\">\n          <path class=\"bars\" d=\"M7 21V13M12 18V7M17 23V10M22 15V5M27 11V3\"></path>\n          <path class=\"line\" d=\"M3 24l7-7 6 6 7-10 6-6\"></path>\n          <circle class=\"dot\" cx=\"3\" cy=\"24\" r=\"2.6\"></circle>\n          <circle class=\"dot\" cx=\"10\" cy=\"17\" r=\"2.6\"></circle>\n          <circle class=\"dot\" cx=\"16\" cy=\"23\" r=\"2.6\"></circle>\n          <circle class=\"dot\" cx=\"23\" cy=\"13\" r=\"2.6\"></circle>\n          <circle class=\"dot\" cx=\"29\" cy=\"7\" r=\"2.6\"></circle>\n        </svg>\n      </div>\n      <div class=\"brand-name\"><b>CONTROLE FINANCEIRO</b></div>\n    </div>\n    <nav class=\"tab-strip\">\n      <button class=\"tab-btn on\" id=\"tbtn-dashboard\" onclick=\"showTab('dashboard',this)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"9\" rx=\"1\"></rect><rect x=\"14\" y=\"3\" width=\"7\" height=\"5\" rx=\"1\"></rect><rect x=\"14\" y=\"12\" width=\"7\" height=\"9\" rx=\"1\"></rect><rect x=\"3\" y=\"16\" width=\"7\" height=\"5\" rx=\"1\"></rect></svg>\n        Dashboard\n      </button>\n      <button class=\"tab-btn\" id=\"tbtn-lancamentos\" onclick=\"showTab('lancamentos',this)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\"></line><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\"></line><line x1=\"3\" y1=\"18\" x2=\"21\" y2=\"18\"></line></svg>\n        Lançamentos\n      </button>\n      <button class=\"tab-btn\" id=\"tbtn-orcamento\" onclick=\"showTab('orcamento',this)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 2v20\"></path><path d=\"M5 9l7-7 7 7\"></path></svg>\n        Orçamento\n      </button>\n      <button class=\"tab-btn\" id=\"tbtn-cadastro\" onclick=\"showTab('cadastro',this)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14\"></path><path d=\"M5 12h14\"></path></svg>\n        Lançar\n      </button>\n      <button class=\"tab-btn\" id=\"tbtn-configuracoes\" onclick=\"showTab('configuracoes',this)\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3\"></circle><path d=\"M12 1v4\"></path><path d=\"M12 19v4\"></path><path d=\"M4.22 4.22l2.83 2.83\"></path><path d=\"M16.95 16.95l2.83 2.83\"></path><path d=\"M1 12h4\"></path><path d=\"M19 12h4\"></path><path d=\"M4.22 19.78l2.83-2.83\"></path><path d=\"M16.95 7.05l2.83-2.83\"></path></svg>\n        Configurações\n      </button>\n    </nav>\n    <div class=\"spc\"></div>\n    <button class=\"btn-icon\" onclick=\"manualRefresh()\" title=\"Recarregar dados\">\n      <svg id=\"refresh-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"23 4 23 10 17 10\"></polyline><path d=\"M20.49 15a9 9 0 1 1-2.12-9.36L23 10\"></path></svg>\n    </button>\n    <div class=\"sync\" id=\"sync\"><span class=\"dot\"></span><span class=\"txt\">conectando…</span></div>\n  </header>\n\n  <!-- SIDEBAR -->\n  <aside class=\"sidebar\" id=\"sb\"></aside>\n\n  <!-- MAIN -->\n  <main class=\"main\">\n\n    <!-- ═══ DASHBOARD ═══ -->\n    <div class=\"tab on page\" id=\"tab-dashboard\">\n      <div class=\"page-hdr\">\n        <div>\n          <div class=\"page-title\">Visão <em>geral</em></div>\n          <div class=\"page-sub\" id=\"dash-period\">Todos os períodos</div>\n          <div class=\"quick-filters\" id=\"quick-filters\">\n            <button class=\"qf-btn\" id=\"qf-current\" onclick=\"setQuickFilter('current')\">Este mês</button>\n            <button class=\"qf-btn\" id=\"qf-prev\" onclick=\"setQuickFilter('prev')\">Mês anterior</button>\n            <button class=\"qf-btn\" id=\"qf-last3\" onclick=\"setQuickFilter('last3')\">Últimos 3 meses</button>\n            <button class=\"qf-btn\" id=\"qf-year\" onclick=\"setQuickFilter('year')\">Ano</button>\n          </div>\n        </div>\n        <div class=\"dash-alert-slot\">\n          <div class=\"alerts\" id=\"dash-alertas\" style=\"display:none\"></div>\n        </div>\n        <div class=\"page-meta\">\n          <span class=\"upd\" id=\"last-upd\"></span>\n        </div>\n      </div>\n\n      <div class=\"kpis\" id=\"kpis\"></div>\n\n      <div class=\"card\" style=\"margin-bottom:10px\">\n        <div class=\"card-hdr\">\n          <div>\n            <div class=\"card-title\">Despesas por mês <em id=\"monthly-year\">—</em></div>\n            <div class=\"card-sub\" style=\"margin-top:3px\">Histórico realizado · meses futuros como previsão tracejada</div>\n          </div>\n        </div>\n        <div class=\"chart-wrap h-md\"><canvas id=\"monthlyC\"></canvas></div>\n      </div>\n\n      <div class=\"row row-2-1\">\n        <div class=\"card\">\n          <div class=\"card-hdr\">\n            <div class=\"card-title\">Despesas por categoria</div>\n            <div class=\"card-sub\" style=\"margin-top:3px\">do período selecionado</div>\n          </div>\n          <div class=\"chart-wrap h-lg\"><canvas id=\"barC\"></canvas></div>\n        </div>\n        <div class=\"card\">\n          <div class=\"card-hdr\">\n            <div class=\"card-title\">Distribuição</div>\n            <div class=\"card-sub\" style=\"margin-top:3px\">% do total</div>\n          </div>\n          <div class=\"chart-wrap h-lg\"><canvas id=\"donutC\"></canvas></div>\n        </div>\n      </div>\n\n      <div class=\"card\" style=\"margin-top:10px\">\n        <div class=\"card-hdr\">\n          <div class=\"card-title\">Evolução das top 5 categorias</div>\n        </div>\n        <div class=\"chart-wrap h-md\"><canvas id=\"lineC\"></canvas></div>\n      </div>\n    </div>\n\n    <!-- ═══ LANÇAMENTOS ═══ -->\n    <div class=\"tab page\" id=\"tab-lancamentos\">\n      <div class=\"page-hdr\">\n        <div>\n          <div class=\"page-title\">Lançamentos</div>\n          <div class=\"page-sub\" id=\"lanc-period\">—</div>\n        </div>\n      </div>\n      <div class=\"tbl-box\">\n        <div class=\"tbl-hdr\">\n          <h3>Movimentações</h3>\n          <span class=\"count\" id=\"dash-count\"></span>\n          <div class=\"spc\"></div>\n          <div class=\"search\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"8\"></circle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"></line></svg>\n            <input id=\"dash-s\" placeholder=\"buscar descrição, categoria, conta…\" oninput=\"renderDT()\">\n          </div>\n        </div>\n        <div style=\"overflow-x:auto\">\n        <table>\n          <thead><tr>\n            <th>Data</th><th>Conta</th><th>Descrição</th><th>Categoria</th><th>Situação</th><th class=\"r\">Valor</th>\n          </tr></thead>\n          <tbody id=\"dash-tb\"></tbody>\n        </table>\n        </div>\n      </div>\n    </div>\n\n    <!-- ═══ ORÇAMENTO ═══ -->\n    <div class=\"tab page\" id=\"tab-orcamento\">\n      <div class=\"page-hdr\">\n        <div>\n          <div class=\"page-title\">Orçamento <em id=\"orc-titulo\">—</em></div>\n          <div class=\"page-sub\">Previsto vs realizado por categoria</div>\n        </div>\n        <div class=\"page-meta\">\n          <button class=\"btn btn-prim\" onclick=\"openOrcModal()\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14\"></path><path d=\"M5 12h14\"></path></svg>\n            Cadastrar orçamento\n          </button>\n          <div class=\"orc-meses\" id=\"orc-mes-row\"></div>\n        </div>\n      </div>\n\n      <div class=\"kpis\" id=\"orc-kpis\"></div>\n\n      <div class=\"card\" style=\"margin-bottom:10px\">\n        <div class=\"card-hdr\">\n          <div class=\"card-title\">Previsto vs realizado · <em>por categoria</em></div>\n        </div>\n        <div class=\"chart-wrap h-md\"><canvas id=\"orcBarC\"></canvas></div>\n      </div>\n\n      <div class=\"orc-cards\" id=\"orc-cards\"></div>\n\n      <div class=\"tbl-box\" style=\"margin-top:10px\">\n        <div class=\"tbl-hdr\">\n          <h3>Detalhamento</h3>\n        </div>\n        <div style=\"overflow-x:auto\">\n        <table>\n          <thead><tr>\n            <th>Grupo</th><th>Cód.</th><th>Descrição</th>\n            <th class=\"r\">Previsto</th><th class=\"r\">Realizado</th><th class=\"r\">Saldo</th>\n            <th>Status</th>\n          </tr></thead>\n          <tbody id=\"orc-tbody\"></tbody>\n        </table>\n        </div>\n      </div>\n    </div>\n\n    <!-- ═══ CADASTRO ═══ -->\n    <div class=\"tab page\" id=\"tab-cadastro\">\n      <div class=\"page-hdr\">\n        <div>\n          <div class=\"page-title\">Nova <em>movimentação</em></div>\n          <div class=\"page-sub\">Lançamento manual</div>\n        </div>\n      </div>\n\n      <div class=\"cad-grid\">\n        <div class=\"form-card\">\n          <h3>Detalhes</h3>\n          <div class=\"type-toggle\">\n            <button class=\"type-btn on-d\" id=\"btn-d\" onclick=\"setTipo('Despesa')\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line></svg>\n              Despesa\n            </button>\n            <button class=\"type-btn\" id=\"btn-r\" onclick=\"setTipo('Receita')\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"></line><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line></svg>\n              Receita\n            </button>\n          </div>\n          <button class=\"btn\" type=\"button\" id=\"rec-toggle\" onclick=\"toggleRecurrence()\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M17 1l4 4-4 4\"></path><path d=\"M3 11V9a4 4 0 0 1 4-4h14\"></path><path d=\"M7 23l-4-4 4-4\"></path><path d=\"M21 13v2a4 4 0 0 1-4 4H3\"></path></svg>\n            Fluxo de recorrência\n          </button>\n          <div class=\"rec-panel\" id=\"rec-panel\">\n            <div class=\"rec-note\">Gera lançamentos futuros como Agendado, mantendo valor, categoria e conta.</div>\n            <div class=\"rec-grid\">\n              <div class=\"field\"><label>Repetir por</label><input type=\"number\" id=\"rec-count\" min=\"1\" max=\"36\" value=\"3\"></div>\n              <div class=\"field\"><label>Frequência</label><select id=\"rec-frequency\"><option value=\"monthly\">Mensal</option></select></div>\n            </div>\n          </div>\n\n          <div class=\"field\"><label>Data</label><input type=\"date\" id=\"f-data\"></div>\n          <div class=\"field\"><label>Fonte / conta</label>\n            <select id=\"f-fonte\"><option value=\"\">Selecione</option>\n              <option>BB</option><option>Inter</option><option>Nubank</option>\n              <option>Rico</option><option>Ticket</option><option>Débito</option><option>Amazon</option><option>Outra</option>\n            </select>\n          </div>\n          <div class=\"field\"><label>Descrição</label><input type=\"text\" id=\"f-item\" placeholder=\"Ex: Uber, Mercado…\"></div>\n          <div class=\"field\"><label>Valor</label>\n            <div class=\"v-wrap\"><span class=\"pfx\">R$</span><input type=\"number\" id=\"f-valor\" step=\"0.01\" min=\"0\" placeholder=\"0,00\"></div>\n          </div>\n          <div class=\"field\"><label>Categoria</label>\n            <select id=\"f-cat\"><option value=\"\">Selecione</option>\n              <option>MERCADO</option><option>TRANSPORTE</option><option>FIXOS</option><option>IFOOD</option>\n              <option>CASAL</option><option>LAZER</option><option>VESTUÁRIO</option><option>CASA</option>\n              <option>CONFORTO</option><option>ALUGUEL</option><option>FORA</option><option>RV</option>\n              <option>RE</option><option>FI</option><option>RO</option><option>CRIPTO</option><option>REEMBOLSO</option><option>OUTRA</option>\n            </select>\n          </div>\n          <div class=\"field\"><label>Subcategoria</label>\n            <select id=\"f-geral\"><option value=\"\">Selecione</option>\n              <option>Supermercado</option><option>Mercado</option><option>Alimentação</option><option>Casal</option>\n              <option>Transporte</option><option>Uber</option><option>Despesas Fixas</option><option>Assinaturas</option>\n              <option>Anuidade</option><option>Ifood</option><option>Casa</option><option>Vestuário</option>\n              <option>Livros e Jogos</option><option>Extra</option><option>Reembolso</option>\n            </select>\n          </div>\n          <div class=\"field\">\n            <label>Situação</label>\n            <div class=\"sit-row\">\n              <button class=\"sit-btn on\" id=\"sit-pago\" onclick=\"setSit('Pago')\">Pago</button>\n              <button class=\"sit-btn\" id=\"sit-pendente\" onclick=\"setSit('Pendente')\">Pendente</button>\n              <button class=\"sit-btn\" id=\"sit-agendado\" onclick=\"setSit('Agendado')\">Agendado</button>\n            </div>\n          </div>\n          <button class=\"btn-add\" id=\"btn-add\" onclick=\"adicionar()\">\n            Adicionar\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line><polyline points=\"12 5 19 12 12 19\"></polyline></svg>\n          </button>\n        </div>\n\n        <div>\n          <div class=\"cad-mini\">\n            <div class=\"kpi neg\">\n              <div class=\"kpi-tag\"><span class=\"accent\"></span>Despesas</div>\n              <div class=\"kpi-val neg\"><span class=\"pfx\">R$</span><span id=\"c-d\">0,00</span></div>\n              <div class=\"kpi-sub\" id=\"c-d-sub\">—</div>\n            </div>\n            <div class=\"kpi pos\">\n              <div class=\"kpi-tag\"><span class=\"accent\"></span>Receitas</div>\n              <div class=\"kpi-val pos\"><span class=\"pfx\">R$</span><span id=\"c-r\">0,00</span></div>\n              <div class=\"kpi-sub\" id=\"c-r-sub\">—</div>\n            </div>\n            <div class=\"kpi\">\n              <div class=\"kpi-tag\"><span class=\"accent\"></span>Saldo</div>\n              <div class=\"kpi-val\" id=\"c-s-wrap\"><span class=\"pfx\" id=\"c-s-pfx\">R$</span><span id=\"c-s\">0,00</span></div>\n              <div class=\"kpi-sub\">receitas − despesas</div>\n            </div>\n          </div>\n          <div class=\"tbl-box\">\n            <div class=\"tbl-hdr\">\n              <h3>Últimas movimentações</h3>\n              <span class=\"count\" id=\"cad-cnt\"></span>\n            </div>\n            <div style=\"overflow-x:auto;max-height:560px;overflow-y:auto\">\n            <table>\n              <thead><tr><th>Data</th><th>Conta</th><th>Descrição</th><th>Categoria</th><th>Situação</th><th class=\"r\">Valor</th></tr></thead>\n              <tbody id=\"cad-tb\"></tbody>\n            </table>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n\n\n    <!-- ═══ CONFIGURAÇÕES ═══ -->\n    <div class=\"tab page\" id=\"tab-configuracoes\">\n      <div class=\"page-hdr\">\n        <div>\n          <div class=\"page-title\">Configurações</div>\n          <div class=\"page-sub\">Preferências visuais e cópia da planilha</div>\n        </div>\n      </div>\n      <div class=\"settings-grid\">\n        <div class=\"settings-card\">\n          <h3>Aparência</h3>\n          <p>Alterne o visual do dashboard entre modo escuro e modo claro.</p>\n          <div class=\"settings-actions\">\n            <button class=\"btn btn-prim\" id=\"theme-toggle\" onclick=\"toggleThemeMode()\">Modo Claro</button>\n          </div>\n        </div>\n        <div class=\"settings-card\">\n          <h3>Exportar planilha</h3>\n          <p>Baixa uma cópia da planilha base em Excel, sem usar armazenamento do Google Drive.</p>\n          <div class=\"settings-actions\">\n            <button class=\"btn\" id=\"export-btn\" onclick=\"exportarPlanilha()\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"></path><path d=\"M7 10l5 5 5-5\"></path><path d=\"M12 15V3\"></path></svg>\n              Excel\n            </button>\n          </div>\n          <div class=\"settings-result\" id=\"export-result\"></div>\n        </div>\n        <div class=\"settings-card\">\n          <h3>Visão executiva</h3>\n          <p>Gera um PDF mensal com resumo, maiores categorias e alertas de orçamento.</p>\n          <div class=\"settings-actions\">\n            <button class=\"btn\" id=\"pdf-btn\" onclick=\"exportarPdfExecutivo()\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"></path><path d=\"M14 2v6h6\"></path><path d=\"M8 13h8\"></path><path d=\"M8 17h5\"></path></svg>\n              PDF executivo\n            </button>\n          </div>\n          <div class=\"settings-result\" id=\"pdf-result\"></div>\n        </div>\n      </div>\n    </div>\n\n  </main>\n</div>\n\n<div id=\"toast\"></div>\n\n<div class=\"modal-backdrop\" id=\"orc-modal\" onclick=\"modalBackdropClose(event)\">\n  <div class=\"orc-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"orc-modal-title\">\n    <div class=\"orc-modal-hdr\">\n      <div>\n        <div class=\"orc-modal-title\" id=\"orc-modal-title\">Cadastrar orçamento</div>\n        <div class=\"orc-modal-sub\">Preencha somente os itens necessários</div>\n      </div>\n      <button class=\"btn-icon\" onclick=\"closeOrcModal()\" title=\"Fechar\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M18 6 6 18\"></path><path d=\"m6 6 12 12\"></path></svg>\n      </button>\n    </div>\n    <div class=\"orc-modal-top\">\n      <div class=\"field\">\n        <label>Mês do orçamento</label>\n        <input type=\"month\" id=\"orc-form-mes\" onchange=\"buildOrcForm()\">\n      </div>\n      <div class=\"field\">\n        <label>Receitas do mês</label>\n        <div class=\"v-wrap\"><span class=\"pfx\">R$</span><input type=\"number\" min=\"0\" step=\"0.01\" id=\"orc-form-receita\" placeholder=\"0,00\" oninput=\"updateOrcBudgetBalance()\"></div>\n      </div>\n      <button class=\"btn\" onclick=\"clearOrcFormValues()\">Limpar valores</button>\n    </div>\n    <div class=\"orc-balance\" id=\"orc-balance\">\n      <div><span>Receita</span><strong id=\"orc-bal-receita\">R$ 0,00</strong></div>\n      <div><span>Previsões</span><strong id=\"orc-bal-prev\">R$ 0,00</strong></div>\n      <div><span>Saldo disponível</span><strong id=\"orc-bal-saldo\">R$ 0,00</strong></div>\n    </div>\n    <div class=\"orc-form-grid\" id=\"orc-form-grid\"></div>\n    <div class=\"orc-modal-foot\">\n      <button class=\"btn\" onclick=\"closeOrcModal()\">Cancelar</button>\n      <button class=\"btn btn-prim\" id=\"orc-save-btn\" onclick=\"salvarOrcamento()\">Salvar orçamento</button>\n    </div>\n  </div>\n</div>\n\n<script>\n/* ═══════════════════════════════════════════════════════════\n   DESEMBOLSO — controle financeiro\n   - Mantém endpoints do servidor: /status /listar /adicionar /orcamento\n   - Mock data fallback quando offline (apenas para visualização)\n   ═══════════════════════════════════════════════════════════ */\n\nconst API = location.hostname === 'localhost' || location.hostname === '127.0.0.1' ? 'http://localhost:5050' : location.origin;\nfunction apiHeaders(extra={}){\n  const key = localStorage.getItem('desembolso-api-key') || '';\n  return key ? {...extra, 'X-API-Key': key} : extra;\n}\nasync function apiFetch(path, options={}, retry=true){\n  const opts = {...options, headers: apiHeaders(options.headers || {})};\n  const r = await fetch(API+path, opts);\n  if(r.status === 401 && retry){\n    const key = prompt('Informe a chave de acesso da API');\n    if(key){\n      localStorage.setItem('desembolso-api-key', key.trim());\n      return apiFetch(path, options, false);\n    }\n  }\n  return r;\n}\nlet tipo = 'Despesa', sit = 'Pago';\nlet allData = [], dashRows = [];\nlet dashMesSel = null, lancMesSel = null;       // null=todos | 'y2026'=ano | {y,m}=mês\nlet dashQuickSel = null;\nlet dashCatsSel = new Set(), lancCatsSel = new Set();\nlet lancFontesSel = new Set();\nlet DC = {};\nlet mockMode = false;\n\n// ── PALETA DE CATEGORIAS ──────────────────────────────────\nconst CC = {\n  MERCADO:'#5b8dff', FIXOS:'#ff5c7a', TRANSPORTE:'#f5b455', CASAL:'#b07cff',\n  IFOOD:'#ff5c9a',   LAZER:'#4dd8d8', ALUGUEL:'#ff7a5c',   FORA:'#ffcc55',\n  CASA:'#4dd89a',    'VESTUÁRIO':'#cc7cff', CONFORTO:'#7baeff', RV:'#ff9955',\n  RE:'#4dd89a', RO:'#7ee5b4', FI:'#ff7a8e', CRIPTO:'#f7931a', REEMBOLSO:'#888c98', OUTRA:'#666b7a'\n};\nconst CC_ORC = {\n  MERCADO:'#5b8dff', FIXOS:'#ff5c7a', TRANSPORTE:'#f5b455', CASAL:'#b07cff',\n  IFOOD:'#ff5c9a',   LAZER:'#4dd8d8', ALUGUEL:'#ff7a5c',   FORA:'#ffcc55',\n  CASA:'#4dd89a',    'VESTUÁRIO':'#cc7cff', CONFORTO:'#7baeff', RV:'#ff9955',\n  RE:'#4dd89a', RO:'#7ee5b4', FI:'#ff7a8e', CRIPTO:'#f7931a', REEMBOLSO:'#888c98'\n};\nconst gc  = c => CC[c]      || '#777b8a';\nconst gco = c => CC_ORC[c]  || '#888c98';\nconst GRUPOS_INVEST = new Set(['INVESTIMENTOS']);\n\n// ── DATA HELPERS ──────────────────────────────────────────\nconst MN = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];\nconst TODAY = new Date();\nconst CUR_Y = TODAY.getFullYear(), CUR_M = TODAY.getMonth();\n\nfunction parseDate(str){\n  if(!str || typeof str !== 'string') return null;\n  const p = str.split('/');\n  if(p.length === 3){\n    const d = parseInt(p[0]), mo = parseInt(p[1])-1;\n    let y = parseInt(p[2]); if(y < 100) y += 2000;\n    if(!isNaN(d) && !isNaN(mo) && !isNaN(y)) return {y, m:mo, d, label:MN[mo]+'-'+String(y).slice(2), str};\n  }\n  const iso = str.slice(0,10).split('-');\n  if(iso.length === 3){\n    const y = parseInt(iso[0]), mo = parseInt(iso[1])-1, d = parseInt(iso[2]);\n    if(!isNaN(y) && !isNaN(mo) && !isNaN(d)) return {y, m:mo, d, label:MN[mo]+'-'+String(y).slice(2), str};\n  }\n  return null;\n}\nfunction isPast(pd){\n  if(!pd) return false;\n  if(pd.y < CUR_Y) return true;\n  if(pd.y === CUR_Y && pd.m <= CUR_M) return true;\n  return false;\n}\nfunction f(v){\n  return Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});\n}\nfunction f0(v){\n  return Math.abs(v).toLocaleString('pt-BR',{maximumFractionDigits:0});\n}\nfunction capLabel(s){\n  return String(s || '').toLowerCase().replace(/(^|\\s|\\/|-)([^\\s\\/-])/g, (m,p,c) => p + c.toUpperCase());\n}\nfunction displayCat(c){ return capLabel(c); }\nfunction toast(msg, kind){\n  const el = document.getElementById('toast');\n  el.textContent = msg;\n  el.className = 'show '+(kind || '');\n  clearTimeout(window._tt); window._tt = setTimeout(()=> el.className = '', 3500);\n}\n\n// ═══════════════ TABS ═══════════════\nfunction showTab(name, btn){\n  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));\n  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));\n  document.getElementById('tab-'+name).classList.add('on');\n  btn.classList.add('on');\n  const shell = document.getElementById('shell');\n  if(name === 'orcamento' || name === 'cadastro' || name === 'configuracoes'){\n    shell.classList.add('sb-hidden');\n    if(name === 'orcamento') initOrcamento();\n  } else {\n    shell.classList.remove('sb-hidden');\n    buildSB();\n    if(name === 'dashboard') renderDash();\n    if(name === 'lancamentos') renderDT();\n  }\n}\n\n// ═══════════════ SERVER ═══════════════\nfunction setSync(state, msg){\n  const el = document.getElementById('sync');\n  if(!el) return;\n  el.classList.remove('s-ok','s-err','s-load','s-mock');\n  const txt = el.querySelector('.txt');\n  if(state === 'load'){ el.classList.add('s-load'); txt.textContent = 'carregando'; }\n  else if(state === 'ok'){ el.classList.add('s-ok'); txt.textContent = 'sincronizado · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }\n  else if(state === 'err'){ el.classList.add('s-err'); txt.textContent = msg || 'offline'; }\n  else if(state === 'mock'){ el.classList.add('s-mock'); txt.textContent = 'modo demo'; }\n}\n\nasync function checkSrv(){\n  setSync('load');\n  try {\n    const r = await apiFetch('/status', {signal: AbortSignal.timeout(2000)});\n    const d = await r.json();\n    if(d.ok){ setSync('ok'); await loadData(); return; }\n    throw new Error('inválido');\n  } catch {\n    // FALLBACK: dados-exemplo para visualização\n    mockMode = true;\n    setSync('mock');\n    allData = generateMockData();\n    processDashRows();\n    renderCadTabela();\n    buildSB();\n    renderDash();\n  }\n}\n\nasync function loadData(){\n  try {\n    const r = await apiFetch('/listar');\n    const d = await r.json();\n    if(!d.ok) return;\n    allData = d.movimentacoes;\n    processDashRows();\n    await loadOrcamentoData();\n    renderCadTabela();\n    buildSB();\n    renderDash();\n  } catch(e){\n    console.error(e);\n    setSync('err', e?.message || 'erro de listagem');\n  }\n}\n\nfunction processDashRows(){\n  dashRows = allData.filter(x => {\n    const v = parseFloat(x.valor) || 0;\n    if(x.tipo !== 'Despesa' || v <= 0) return false;\n    const pd = parseDate(x.data);\n    return isPast(pd);\n  }).map(x => ({...x, pd: parseDate(x.data)}));\n}\n\nasync function manualRefresh(){\n  const icon = document.getElementById('refresh-icon');\n  icon.style.transition = 'transform .6s';\n  icon.style.transform = 'rotate(360deg)';\n  setTimeout(()=>{ icon.style.transition=''; icon.style.transform=''; }, 700);\n  if(mockMode){\n    setSync('mock');\n  } else {\n    await loadData();\n  }\n  const now = new Date();\n  const label = now.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})\n    + ' · '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});\n  const el = document.getElementById('last-upd');\n  if(el) el.textContent = 'atualizado em '+label;\n}\n\n// ═══════════════ MOCK DATA ═══════════════\nfunction generateMockData(){\n  const cats = ['MERCADO','TRANSPORTE','FIXOS','IFOOD','CASAL','LAZER','VESTUÁRIO','CASA','CONFORTO','ALUGUEL','FORA','OUTRA'];\n  const fontes = ['BB','Inter','Nubank','Rico','Ticket','Débito'];\n  const descPool = {\n    MERCADO:['Pão de Açúcar','Carrefour','Mercado Extra','Sams Club','Feira'],\n    TRANSPORTE:['Uber','99','Posto Shell','Estacionamento','Metrô'],\n    FIXOS:['Internet Vivo','Conta Luz','Conta Água','Celular','Streaming'],\n    IFOOD:['iFood almoço','iFood janta','Rappi','Delivery sushi'],\n    CASAL:['Restaurante','Cinema','Programa','Presente'],\n    LAZER:['Spotify','Netflix','Steam','Livro Amazon','Cinema'],\n    'VESTUÁRIO':['Zara','Renner','C&A','Tênis','Camisa'],\n    CASA:['Decoração','Limpeza','Reparo','Eletrodoméstico'],\n    CONFORTO:['Farmácia','Academia','Massagem','Cosmético'],\n    ALUGUEL:['Aluguel mensal','Condomínio'],\n    FORA:['Restaurante','Bar','Almoço fora'],\n    OUTRA:['Diversos','Avulso','Não categorizado']\n  };\n  const data = [];\n  // 6 meses para trás + atual\n  for(let mOff = -6; mOff <= 0; mOff++){\n    const dt = new Date(CUR_Y, CUR_M + mOff, 1);\n    const y = dt.getFullYear(), m = dt.getMonth();\n    const numLanc = 35 + Math.floor(Math.random()*15);\n    for(let i = 0; i < numLanc; i++){\n      const cat = cats[Math.floor(Math.random()*cats.length)];\n      const desc = descPool[cat][Math.floor(Math.random()*descPool[cat].length)];\n      const fonte = fontes[Math.floor(Math.random()*fontes.length)];\n      const day = 1 + Math.floor(Math.random()*28);\n      const baseVal = {\n        MERCADO:[80,400], TRANSPORTE:[15,80], FIXOS:[80,250], IFOOD:[25,75],\n        CASAL:[60,300], LAZER:[20,150], 'VESTUÁRIO':[80,500], CASA:[40,300],\n        CONFORTO:[30,200], ALUGUEL:[2200,2400], FORA:[40,180], OUTRA:[20,200]\n      }[cat] || [20,200];\n      const valor = (baseVal[0] + Math.random()*(baseVal[1]-baseVal[0])).toFixed(2);\n      data.push({\n        data: String(day).padStart(2,'0')+'/'+String(m+1).padStart(2,'0')+'/'+y,\n        fonte, item:desc, valor, categoria:cat, geral:'', situacao:'Pago', tipo:'Despesa'\n      });\n    }\n    // 2 receitas\n    data.push({\n      data:'05/'+String(m+1).padStart(2,'0')+'/'+y,\n      fonte:'BB', item:'Salário', valor:'8500.00', categoria:'OUTRA', geral:'',\n      situacao:'Pago', tipo:'Receita'\n    });\n    data.push({\n      data:'20/'+String(m+1).padStart(2,'0')+'/'+y,\n      fonte:'Inter', item:'Freelance', valor:'1200.00', categoria:'OUTRA', geral:'',\n      situacao:'Pago', tipo:'Receita'\n    });\n  }\n  return data;\n}\n\nfunction generateMockOrcamento(){\n  // gera 4 meses (3 anteriores + atual)\n  const meses = [];\n  for(let mOff = -3; mOff <= 0; mOff++){\n    const dt = new Date(CUR_Y, CUR_M + mOff, 1);\n    const serial = Math.round((dt - new Date(1899,11,30))/86400000);\n    meses.push({\n      serial,\n      label: MN[dt.getMonth()]+'-'+String(dt.getFullYear()).slice(2)\n    });\n  }\n  const cats = [\n    {grupo:'DESPESAS FIXAS', cod:'ALUGUEL',     desc:'Aluguel + Condomínio',  prev:2400},\n    {grupo:'DESPESAS FIXAS', cod:'FIXOS',       desc:'Internet, Luz, Água',   prev:550},\n    {grupo:'DESPESAS FIXAS', cod:'CONFORTO',    desc:'Farmácia + Academia',   prev:300},\n    {grupo:'VARIÁVEIS',      cod:'MERCADO',     desc:'Supermercado',          prev:1200},\n    {grupo:'VARIÁVEIS',      cod:'TRANSPORTE',  desc:'Combustível + Uber',    prev:600},\n    {grupo:'VARIÁVEIS',      cod:'IFOOD',       desc:'Delivery',              prev:400},\n    {grupo:'LAZER',          cod:'CASAL',       desc:'Programas a dois',      prev:600},\n    {grupo:'LAZER',          cod:'LAZER',       desc:'Streaming, Livros',     prev:300},\n    {grupo:'LAZER',          cod:'FORA',        desc:'Restaurantes',          prev:500},\n    {grupo:'OUTROS',         cod:'VESTUÁRIO',   desc:'Roupas',                prev:300},\n    {grupo:'OUTROS',         cod:'CASA',        desc:'Casa',                  prev:250},\n    {grupo:'INVESTIMENTOS',  cod:'CRIPO',       desc:'Cripto mensal',         prev:500},\n    {grupo:'INVESTIMENTOS',  cod:'RV',          desc:'Renda Variável',        prev:1000},\n  ];\n  const linhas = cats.map(c => {\n    const mesesArr = meses.map((_,i) => {\n      const fator = i === meses.length-1 ? 0.6 + Math.random()*0.8 : 0.7 + Math.random()*0.6;\n      const realizado = +(c.prev * fator).toFixed(2);\n      return {\n        previsto: c.prev,\n        realizado,\n        saldo: +(c.prev - realizado).toFixed(2)\n      };\n    });\n    return {...c, meses: mesesArr};\n  });\n  return {ok:true, meses, linhas};\n}\n\n// ═══════════════ SIDEBAR ═══════════════\nfunction buildSB(){\n  const dashOn = document.getElementById('tab-dashboard').classList.contains('on');\n  const lancOn = document.getElementById('tab-lancamentos').classList.contains('on');\n  const sb = document.getElementById('sb');\n  if(!dashOn && !lancOn) return;\n  const mesState = dashOn ? dashMesSel : lancMesSel;\n  const catState = dashOn ? dashCatsSel : lancCatsSel;\n\n  const map = {}, totByMes = {};\n  dashRows.forEach(r => {\n    if(!r.pd) return;\n    const {y,m} = r.pd;\n    if(!map[y]) map[y] = new Set();\n    map[y].add(m);\n    const k = y+'-'+m;\n    totByMes[k] = (totByMes[k] || 0) + (parseFloat(r.valor) || 0);\n  });\n  const years = Object.keys(map).map(Number).sort((a,b)=>b-a);\n\n  let h = '';\n  h += '<div class=\"sb-section\">';\n  h += '<div class=\"sb-head\">Período</div>';\n  h += `<div class=\"sb-item${mesState===null && !(dashOn && dashQuickSel)?' on':''}\" onclick=\"setMes(null)\">\n    <span class=\"dot\"></span>Todos os períodos\n  </div>`;\n\n  years.forEach(y => {\n    const yKey = 'y'+y;\n    const yOn = mesState === yKey;\n    h += `<div class=\"sb-year${yOn?' on':''}\" onclick=\"setMes('${yKey}')\">\n      <div class=\"sb-year-row\"><span class=\"sb-year-num\">${y}</span></div>\n      <div class=\"sb-year-sub\">ano completo</div>\n    </div>`;\n    const meses = [...map[y]].sort((a,b)=>b-a);\n    meses.forEach(m => {\n      const on = mesState && typeof mesState === 'object' && mesState.y === y && mesState.m === m;\n      h += `<div class=\"sb-mes${on?' on':''}\" onclick=\"setMes({y:${y},m:${m}})\">\n        <span class=\"sd\"></span>${capLabel(MN[m])}-${String(y).slice(2)}\n      </div>`;\n    });\n  });\n  h += '</div>';\n\n  const cats = {};\n  dashRows.forEach(r => {\n    if(!r.categoria) return;\n    cats[r.categoria] = (cats[r.categoria]||0) + (parseFloat(r.valor)||0);\n  });\n  const cE = Object.entries(cats).sort((a,b)=>b[1]-a[1]);\n  h += '<div class=\"sb-section\">';\n  h += `<div class=\"sb-head\">Categoria <span class=\"count${catState.size?' acc':''}\">${catState.size||'todas'}</span></div>`;\n  cE.forEach(([c]) => {\n    const on = catState.has(c);\n    h += `<div class=\"sb-cat${on?' on':''}\" onclick=\"toggleCat('${c}',event)\">\n      <span class=\"cd\" style=\"background:${gc(c)}\"></span>${displayCat(c)}\n    </div>`;\n  });\n  h += '</div>';\n\n  if(lancOn){\n    const fontesC = {};\n    dashRows.forEach(r => {\n      if(!r.fonte) return;\n      fontesC[r.fonte] = (fontesC[r.fonte]||0) + (parseFloat(r.valor)||0);\n    });\n    const fE = Object.entries(fontesC).sort((a,b)=>b[1]-a[1]);\n    h += '<div class=\"sb-section\">';\n    h += `<div class=\"sb-head\">Fonte <span class=\"count${lancFontesSel.size?' acc':''}\">${lancFontesSel.size||'todas'}</span></div>`;\n    fE.forEach(([fo]) => {\n      const on = lancFontesSel.has(fo);\n      h += `<div class=\"sb-item${on?' on':''}\" onclick=\"toggleFonte('${fo}',event)\">\n        <span class=\"dot\"></span>${fo}\n      </div>`;\n    });\n    h += '</div>';\n  }\n\n  sb.innerHTML = h;\n}\n\nfunction activeFilterMode(){ return document.getElementById('tab-lancamentos')?.classList.contains('on') ? 'lanc' : 'dash'; }\nfunction filterState(mode = activeFilterMode()){\n  return mode === 'lanc'\n    ? {mes:lancMesSel, quick:null, cats:lancCatsSel, fontes:lancFontesSel}\n    : {mes:dashMesSel, quick:dashQuickSel, cats:dashCatsSel, fontes:new Set()};\n}\nfunction setMes(v){\n  if(activeFilterMode() === 'lanc') lancMesSel = v;\n  else { dashQuickSel = null; dashMesSel = v; }\n  updateQuickButtons(); buildSB();\n  activeFilterMode() === 'lanc' ? renderDT() : renderDash();\n}\nfunction quickRange(kind){\n  let start = new Date(CUR_Y, CUR_M, 1), end = new Date(CUR_Y, CUR_M + 1, 0), label = 'Este mês';\n  if(kind === 'prev'){\n    start = new Date(CUR_Y, CUR_M - 1, 1); end = new Date(CUR_Y, CUR_M, 0); label = 'Mês anterior';\n  } else if(kind === 'last3'){\n    start = new Date(CUR_Y, CUR_M - 2, 1); end = new Date(CUR_Y, CUR_M + 1, 0); label = 'Últimos 3 meses';\n  } else if(kind === 'year'){\n    start = new Date(CUR_Y, 0, 1); end = new Date(CUR_Y, 11, 31); label = 'Ano '+CUR_Y;\n  }\n  return {kind, label, sy:start.getFullYear(), sm:start.getMonth(), ey:end.getFullYear(), em:end.getMonth()};\n}\nfunction setQuickFilter(kind){ dashQuickSel = quickRange(kind); dashMesSel = null; updateQuickButtons(); buildSB(); renderDash(); }\nfunction updateQuickButtons(){\n  ['current','prev','last3','year'].forEach(k => document.getElementById('qf-'+k)?.classList.toggle('on', dashQuickSel?.kind === k));\n}\nfunction toggleCat(c, e){\n  const set = activeFilterMode() === 'lanc' ? lancCatsSel : dashCatsSel;\n  if(e && e.ctrlKey){ set.has(c) ? set.delete(c) : set.add(c); }\n  else { const only = set.has(c) && set.size === 1; set.clear(); if(!only) set.add(c); }\n  buildSB(); activeFilterMode() === 'lanc' ? renderDT() : renderDash();\n}\nfunction toggleFonte(f, e){\n  const set = lancFontesSel;\n  if(e && e.ctrlKey){ set.has(f) ? set.delete(f) : set.add(f); }\n  else { const only = set.has(f) && set.size === 1; set.clear(); if(!only) set.add(f); }\n  buildSB(); renderDT();\n}\n\n// ═══════════════ FILTRO ═══════════════\nfunction monthKey(pd){ return pd ? pd.y * 12 + pd.m : null; }\nfunction filt(mode = activeFilterMode()){\n  const state = filterState(mode);\n  return dashRows.filter(r => {\n    let okM = true;\n    if(state.quick){\n      const k = monthKey(r.pd);\n      okM = k !== null && k >= (state.quick.sy * 12 + state.quick.sm) && k <= (state.quick.ey * 12 + state.quick.em);\n    } else if(state.mes !== null){\n      if(typeof state.mes === 'string' && state.mes.startsWith('y')){\n        okM = r.pd && r.pd.y === parseInt(state.mes.slice(1));\n      } else if(state.mes && typeof state.mes === 'object'){\n        okM = r.pd && r.pd.y === state.mes.y && r.pd.m === state.mes.m;\n      }\n    }\n    const okC = state.cats.size === 0 || state.cats.has(r.categoria);\n    const okF = state.fontes.size === 0 || state.fontes.has(r.fonte);\n    return okM && okC && okF;\n  });\n}\nfunction periodLabel(mode = activeFilterMode()){\n  const state = filterState(mode);\n  let pl = state.quick ? state.quick.label : 'Todos os períodos';\n  if(!state.quick && state.mes !== null){\n    if(typeof state.mes === 'string') pl = 'Ano '+state.mes.slice(1);\n    else if(state.mes.y) pl = capLabel(MN[state.mes.m])+'-'+String(state.mes.y).slice(2)+' · mês';\n  }\n  if(state.cats.size) pl += ' · cat '+[...state.cats].join(', ');\n  if(state.fontes.size) pl += ' · '+[...state.fontes].join('/');\n  return pl;\n}\n\n// ═══════════════ DASHBOARD ═══════════════\nfunction renderDash(){\n  const rows = filt('dash');\n\n  // période label\n  const pl = periodLabel('dash');\n  document.getElementById('dash-period').textContent = pl;\n  updateQuickButtons();\n\n  // KPIs\n  const total = rows.reduce((s,r) => s + (parseFloat(r.valor)||0), 0);\n  const cats = {};\n  rows.forEach(r => cats[r.categoria] = (cats[r.categoria]||0) + (parseFloat(r.valor)||0));\n  const topCat = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];\n  const mesesU = new Set(rows.filter(r => r.pd).map(r => r.pd.y+'-'+r.pd.m));\n  const nm = mesesU.size || 1;\n  const media = total / nm;\n\n  // trend: compara mês atual vs anterior se relevante\n  let trendHtml = '';\n  if(typeof dashMesSel === 'object' && dashMesSel?.y != null){\n    const prev = new Date(dashMesSel.y, dashMesSel.m-1, 1);\n    const py = prev.getFullYear(), pm = prev.getMonth();\n    const prevSum = dashRows.filter(r => r.pd && r.pd.y===py && r.pd.m===pm)\n      .reduce((s,r)=>s+(parseFloat(r.valor)||0), 0);\n    if(prevSum > 0){\n      const diff = ((total - prevSum) / prevSum) * 100;\n      const dir = diff >= 0 ? 'up' : 'dn';\n      const sign = diff >= 0 ? '+' : '−';\n      trendHtml = `<span class=\"kpi-trend ${dir}\">${sign}${Math.abs(diff).toFixed(0)}%</span>`;\n    }\n  }\n\n  // receitas/saldo\n  const totRec = allData.filter(x => x.tipo === 'Receita').reduce((s,r) => s + (parseFloat(r.valor)||0), 0);\n  const periodCountLabel = mesesU.size ? mesesU.size+' meses' : 'sem período';\n\n  document.getElementById('kpis').innerHTML = `\n    <div class=\"kpi neg\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Total despesas</div>\n      <div class=\"kpi-val neg\"><span class=\"pfx\">R$</span>${f(total)}</div>\n      <div class=\"kpi-sub\">${rows.length} lançamentos<span class=\"sep\"></span>${periodCountLabel} ${trendHtml}</div>\n    </div>\n    <div class=\"kpi\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Média mensal</div>\n      <div class=\"kpi-val\"><span class=\"pfx\">R$</span>${f(media)}</div>\n      <div class=\"kpi-sub\">média sobre ${nm} mês${nm!==1?'es':''}</div>\n    </div>\n    <div class=\"kpi vio\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Maior categoria</div>\n      <div class=\"kpi-val vio\"><span class=\"cat-name\">${topCat?topCat[0]:'—'}</span></div>\n      <div class=\"kpi-sub\">${topCat?'R$ '+f(topCat[1])+' · '+Math.round(topCat[1]/total*100)+'%':'—'}</div>\n    </div>\n    <div class=\"kpi pos\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Receitas totais</div>\n      <div class=\"kpi-val pos\"><span class=\"pfx\">R$</span>${f(totRec)}</div>\n      <div class=\"kpi-sub\">saldo R$ ${f(totRec-total)} ${totRec-total>=0?'<span class=\"kpi-trend dn\">positivo</span>':'<span class=\"kpi-trend up\">negativo</span>'}</div>\n    </div>\n  `;\n\n  // destrói charts\n  Object.values(DC).forEach(c => { try{ c.destroy(); }catch(e){} });\n  DC = {};\n\n  const ce = Object.entries(cats).sort((a,b)=>b[1]-a[1]);\n  const base = {responsive:true, maintainAspectRatio:false};\n  const txStyle = {color:'#8a8f9c', font:{family:'JetBrains Mono', size:10, weight:'500'}};\n  const gridStyle = {color:'rgba(255,255,255,.04)', drawTicks:false};\n\n  // BAR HORIZONTAL\n  const barLabelPlugin = {id:'barLabels', afterDatasetsDraw(chart){\n    const {ctx, data, scales:{x,y}} = chart;\n    ctx.save();\n    ctx.font = '600 11px \"JetBrains Mono\"';\n    ctx.fillStyle = '#b6bcc8';\n    ctx.textBaseline = 'middle';\n    data.datasets[0].data.forEach((v,i) => {\n      if(!v) return;\n      const bar = chart.getDatasetMeta(0).data[i];\n      ctx.fillText('R$ '+f0(v), x.getPixelForValue(v)+8, bar.y);\n    });\n    ctx.restore();\n  }};\n\n  DC.bar = new Chart(document.getElementById('barC'), {\n    type:'bar',\n    data:{\n      labels: ce.map(c => c[0]),\n      datasets:[{\n        data: ce.map(c => c[1]),\n        backgroundColor: ce.map(c => gc(c[0])+'cc'),\n        borderColor: ce.map(c => gc(c[0])),\n        borderWidth:0,\n        borderRadius:3,\n      }]\n    },\n    options:{\n      ...base, indexAxis:'y',\n      plugins:{\n        legend:{display:false},\n        tooltip:{\n          backgroundColor:'#1a1d27', titleColor:'#e9ecf3', bodyColor:'#b6bcc8',\n          borderColor:'rgba(255,255,255,.09)', borderWidth:1, padding:10,\n          titleFont:{family:'JetBrains Mono', size:11},\n          bodyFont:{family:'JetBrains Mono', size:11},\n          callbacks:{label: ctx => ' R$ '+f(ctx.raw)}\n        }\n      },\n      layout:{padding:{right:110, left:6}},\n      scales:{\n        x:{display:false, grid:{display:false}},\n        y:{grid:gridStyle, ticks:txStyle, border:{display:false}}\n      }\n    },\n    plugins:[barLabelPlugin]\n  });\n\n  // DONUT\n  const donutPctPlugin = {id:'donutPct', afterDatasetsDraw(chart){\n    const {ctx, data} = chart;\n    const tot = data.datasets[0].data.reduce((s,v)=>s+v, 0);\n    ctx.save();\n    ctx.font = '600 11px \"JetBrains Mono\"';\n    ctx.fillStyle = '#fff';\n    ctx.textAlign = 'center';\n    ctx.textBaseline = 'middle';\n    chart.getDatasetMeta(0).data.forEach((arc,i) => {\n      const v = data.datasets[0].data[i];\n      const pct = Math.round(v/tot*100);\n      if(pct < 5) return;\n      const angle = (arc.startAngle + arc.endAngle)/2;\n      const r = (arc.innerRadius + arc.outerRadius)/2;\n      ctx.fillText(pct+'%', arc.x + Math.cos(angle)*r, arc.y + Math.sin(angle)*r);\n    });\n    // texto central\n    ctx.font = '500 10px \"JetBrains Mono\"';\n    ctx.fillStyle = '#7e8492';\n    ctx.fillText('TOTAL', chart.getDatasetMeta(0).data[0]?.x || 0, (chart.getDatasetMeta(0).data[0]?.y || 0) - 10);\n    ctx.font = '600 16px \"JetBrains Mono\"';\n    ctx.fillStyle = '#e9ecf3';\n    ctx.fillText('R$ '+f0(tot), chart.getDatasetMeta(0).data[0]?.x || 0, (chart.getDatasetMeta(0).data[0]?.y || 0) + 8);\n    ctx.restore();\n  }};\n\n  DC.donut = new Chart(document.getElementById('donutC'), {\n    type:'doughnut',\n    data:{\n      labels: ce.map(c => c[0]),\n      datasets:[{\n        data: ce.map(c => c[1]),\n        backgroundColor: ce.map(c => gc(c[0])),\n        borderWidth:2,\n        borderColor:'#10131b',\n        hoverOffset:8\n      }]\n    },\n    options:{\n      ...base, cutout:'68%',\n      plugins:{\n        legend:{position:'bottom', labels:{\n          color:'#b6bcc8',\n          font:{family:'JetBrains Mono', size:9, weight:'500'},\n          boxWidth:8, boxHeight:8, padding:7, usePointStyle:true, pointStyle:'circle'\n        }},\n        tooltip:{\n          backgroundColor:'#1a1d27', titleColor:'#e9ecf3', bodyColor:'#b6bcc8',\n          borderColor:'rgba(255,255,255,.09)', borderWidth:1, padding:10,\n          callbacks:{label: ctx => ' '+ctx.label+' · R$ '+f(ctx.raw)+' ('+Math.round(ctx.raw/total*100)+'%)'}\n        }\n      }\n    },\n    plugins:[donutPctPlugin]\n  });\n\n  // LINE\n  const allMeses = [...new Set(dashRows.filter(r => r.pd).map(r => r.pd.y+'-'+r.pd.m))]\n    .sort()\n    .map(k => { const [y,m] = k.split('-'); return {key:k, y:parseInt(y), m:parseInt(m), label:capLabel(MN[parseInt(m)])+'-'+String(y).slice(2)}; });\n  const top5 = ce.slice(0,5).map(c => c[0]);\n  const bmc = {};\n  dashRows.filter(r => dashCatsSel.size === 0 || dashCatsSel.has(r.categoria)).forEach(r => {\n    if(!r.pd) return;\n    const k = r.pd.y+'-'+r.pd.m+'|'+r.categoria;\n    bmc[k] = (bmc[k]||0) + (parseFloat(r.valor)||0);\n  });\n  DC.line = new Chart(document.getElementById('lineC'), {\n    type:'line',\n    data:{\n      labels: allMeses.map(x => x.label),\n      datasets: top5.map(cat => ({\n        label: cat,\n        data: allMeses.map(x => bmc[x.key+'|'+cat]||0),\n        borderColor: gc(cat),\n        backgroundColor: gc(cat)+'15',\n        borderWidth:2,\n        pointRadius:3,\n        pointBackgroundColor: gc(cat),\n        pointBorderWidth:0,\n        tension:.35,\n        fill:false\n      }))\n    },\n    options:{\n      ...base,\n      plugins:{\n        legend:{position:'top', align:'end', labels:{\n          color:'#b6bcc8', font:{family:'JetBrains Mono', size:10, weight:'500'},\n          boxWidth:8, boxHeight:8, padding:10, usePointStyle:true, pointStyle:'circle'\n        }},\n        tooltip:{\n          backgroundColor:'#1a1d27', titleColor:'#e9ecf3', bodyColor:'#b6bcc8',\n          borderColor:'rgba(255,255,255,.09)', borderWidth:1, padding:10,\n          titleFont:{family:'JetBrains Mono', size:11},\n          bodyFont:{family:'JetBrains Mono', size:11},\n          callbacks:{label: ctx => ' '+ctx.dataset.label+': R$ '+f(ctx.raw)}\n        }\n      },\n      scales:{\n        x:{grid:gridStyle, ticks:txStyle, border:{display:false}},\n        y:{grid:gridStyle, ticks:{...txStyle, callback: v => 'R$'+f0(v)}, border:{display:false}}\n      }\n    }\n  });\n\n  // MENSAL (ano atual)\n  const anoAtual = CUR_Y;\n  document.getElementById('monthly-year').textContent = anoAtual;\n  const rowsAno = allData.filter(x => {\n    const v = parseFloat(x.valor)||0;\n    if(x.tipo !== 'Despesa' || v <= 0) return false;\n    const pd = parseDate(x.data);\n    if(!pd || pd.y !== anoAtual) return false;\n    const okC = dashCatsSel.size === 0 || dashCatsSel.has(x.categoria);\n    return okC;\n  }).map(x => ({...x, pd: parseDate(x.data)}));\n  const totMes = Array(12).fill(0);\n  rowsAno.forEach(r => totMes[r.pd.m] += (parseFloat(r.valor)||0));\n\n  DC.monthly = new Chart(document.getElementById('monthlyC'), {\n    type:'bar',\n    data:{\n      labels: MN.map(m => m.toUpperCase()),\n      datasets:[{\n        data: totMes,\n        backgroundColor: MN.map((_,i) =>\n          i > CUR_M ? 'rgba(91,141,255,.18)' :\n          i === CUR_M ? 'rgba(91,141,255,.85)' :\n          'rgba(91,141,255,.55)'\n        ),\n        borderColor: MN.map((_,i) =>\n          i > CUR_M ? 'rgba(91,141,255,.55)' :\n          i === CUR_M ? '#7ba4ff' :\n          'rgba(91,141,255,.85)'\n        ),\n        borderWidth: MN.map((_,i) => i > CUR_M ? 1.5 : 0),\n        borderRadius:3,\n        borderSkipped:false,\n      }]\n    },\n    options:{\n      ...base,\n      plugins:{\n        legend:{display:false},\n        tooltip:{\n          backgroundColor:'#1a1d27', titleColor:'#e9ecf3', bodyColor:'#b6bcc8',\n          borderColor:'rgba(255,255,255,.09)', borderWidth:1, padding:10,\n          titleFont:{family:'JetBrains Mono', size:11},\n          bodyFont:{family:'JetBrains Mono', size:11},\n          callbacks:{\n            label: ctx => ctx.raw > 0\n              ? (ctx.dataIndex > CUR_M ? ' previsto: R$ '+f(ctx.raw) : ' realizado: R$ '+f(ctx.raw))\n              : ' sem dados',\n            title: ctx => ctx[0].label + (ctx[0].dataIndex > CUR_M ? ' · previsão' : ctx[0].dataIndex === CUR_M ? ' · mês atual' : '')\n          }\n        }\n      },\n      scales:{\n        x:{\n          grid:{display:false},\n          ticks:{\n            color: MN.map((_,i) => i === CUR_M ? '#7ba4ff' : i > CUR_M ? '#555a68' : '#8a8f9c'),\n            font:{family:'JetBrains Mono', size:10, weight:'500'}\n          },\n          border:{display:false}\n        },\n        y:{\n          grid:gridStyle,\n          ticks:{...txStyle, callback: v => 'R$'+f0(v)},\n          border:{display:false}\n        }\n      }\n    }\n  });\n\n  // Alertas (precisa orcLinhas carregado)\n  buildEstouros(rows);\n  renderDT();\n}\n\n// ═══════════════ LANÇAMENTOS ═══════════════\nfunction renderDT(){\n  const q = (document.getElementById('dash-s')?.value || '').toLowerCase();\n  const lp = document.getElementById('lanc-period'); if(lp) lp.textContent = periodLabel('lanc');\n  const rows = filt('lanc').filter(r =>\n    !q || (r.item||'').toLowerCase().includes(q)\n      || (r.categoria||'').toLowerCase().includes(q)\n      || (r.fonte||'').toLowerCase().includes(q)\n  );\n  rows.sort((a,b) => {\n    if(a.pd && b.pd){\n      if(b.pd.y !== a.pd.y) return b.pd.y - a.pd.y;\n      if(b.pd.m !== a.pd.m) return b.pd.m - a.pd.m;\n      if(b.pd.d !== a.pd.d) return b.pd.d - a.pd.d;\n    }\n    return (parseFloat(b.valor)||0) - (parseFloat(a.valor)||0);\n  });\n  document.getElementById('dash-count').textContent = rows.length+' itens';\n\n  const tb = document.getElementById('dash-tb');\n  if(!rows.length){\n    tb.innerHTML = '<tr><td colspan=\"6\" style=\"text-align:center;color:var(--tx3);padding:32px;font-family:var(--mono);font-size:12px\">Nenhum lançamento.</td></tr>';\n    return;\n  }\n\n  const grupos = {};\n  rows.forEach(r => {\n    const key = r.pd ? r.pd.y+'-'+String(r.pd.m).padStart(2,'0') : 'sem-data';\n    const lbl = r.pd ? MN[r.pd.m]+' '+r.pd.y : 'sem data';\n    if(!grupos[key]) grupos[key] = {label:lbl, rows:[], total:0};\n    grupos[key].rows.push(r);\n    grupos[key].total += (parseFloat(r.valor)||0);\n  });\n\n  let html = '';\n  Object.keys(grupos).sort().reverse().forEach(key => {\n    const g = grupos[key];\n    html += `<tr class=\"gr-row\">\n      <td colspan=\"5\">${g.label} <span class=\"ct\">${g.rows.length} lançamentos</span></td>\n      <td class=\"r\">R$ ${f(g.total)}</td>\n    </tr>`;\n    html += g.rows.map(r => {\n      const c = gc(r.categoria);\n      const sitClass = r.situacao === 'Pago' ? 'pago' : r.situacao === 'Pendente' ? 'pend' : r.situacao === 'Agendado' ? 'agen' : '';\n      return `<tr>\n        <td class=\"td-date\">${r.data||''}</td>\n        <td>${r.fonte||''}</td>\n        <td class=\"td-item\">${r.item||''}</td>\n        <td><span class=\"pill\" style=\"background:${c}18;color:${c};border-color:${c}50\"><span class=\"dot\" style=\"background:${c}\"></span>${displayCat(r.categoria)}</span></td>\n        <td><span class=\"pill ${sitClass}\">${capLabel(r.situacao||'—')}</span></td>\n        <td class=\"val-neg\">R$ ${f(r.valor)}</td>\n      </tr>`;\n    }).join('');\n  });\n  tb.innerHTML = html;\n}\n\n// ═══════════════ CADASTRO ═══════════════\nconst fData = document.getElementById('f-data');\nif(fData) fData.value = new Date().toISOString().split('T')[0];\n\nfunction setTipo(t){\n  tipo = t;\n  document.getElementById('btn-d').className = 'type-btn'+(t==='Despesa'?' on-d':'');\n  document.getElementById('btn-r').className = 'type-btn'+(t==='Receita'?' on-r':'');\n}\nfunction setSit(s){\n  sit = s;\n  ['pago','pendente','agendado'].forEach(x =>\n    document.getElementById('sit-'+x).className = 'sit-btn'+(sit.toLowerCase()===x?' on':''));\n}\nfunction toggleRecurrence(){\n  const panel = document.getElementById('rec-panel');\n  panel?.classList.toggle('on');\n  document.getElementById('rec-toggle')?.classList.toggle('btn-prim', panel?.classList.contains('on'));\n}\nfunction addMonthsToInputDate(value, months){\n  const [y,m,d] = value.split('-').map(Number);\n  const dt = new Date(y, m - 1 + months, d || 1);\n  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');\n}\nfunction recurrencePayloads(base){\n  const panel = document.getElementById('rec-panel');\n  if(!panel?.classList.contains('on')) return [];\n  const count = Math.max(0, Math.min(36, parseInt(document.getElementById('rec-count')?.value || '0')));\n  return Array.from({length:count}, (_,i) => ({...base, data:addMonthsToInputDate(base.data, i+1), situacao:'Agendado', item:base.item+' (recorrente)'}));\n}\n\nasync function adicionar(){\n  const data  = document.getElementById('f-data').value;\n  const fonte = document.getElementById('f-fonte').value;\n  const item  = document.getElementById('f-item').value.trim();\n  const valor = parseFloat(document.getElementById('f-valor').value);\n  const cat   = document.getElementById('f-cat').value;\n  const geral = document.getElementById('f-geral').value;\n  if(!data || !fonte || !item || isNaN(valor) || valor <= 0 || !cat){\n    toast('Preencha todos os campos obrigatórios.', 'err'); return;\n  }\n  const basePayload = {data, fonte, item, valor, categoria:cat, geral, situacao:sit, tipo};\n  const recs = recurrencePayloads(basePayload);\n  if(mockMode){\n    // adiciona localmente\n    const [y,m,d] = data.split('-');\n    allData.push({\n      data: d+'/'+m+'/'+y, fonte, item, valor:String(valor), categoria:cat, geral, situacao:sit, tipo\n    });\n    recs.forEach(rec => {\n      const [ry,rm,rd] = rec.data.split('-');\n      allData.push({data:rd+'/'+rm+'/'+ry, fonte, item:rec.item, valor:String(valor), categoria:cat, geral, situacao:'Agendado', tipo});\n    });\n    processDashRows();\n    renderCadTabela();\n    buildSB();\n    renderDash();\n    toast(recs.length ? 'Adicionado com recorrências (modo demo) ✓' : 'Adicionado (modo demo) ✓', 'ok');\n    document.getElementById('f-item').value = '';\n    document.getElementById('f-valor').value = '';\n    return;\n  }\n  const btn = document.getElementById('btn-add');\n  btn.disabled = true; btn.innerHTML = 'Salvando…';\n  try {\n    const r = await apiFetch('/adicionar', {\n      method:'POST',\n      headers:{'Content-Type':'application/json'},\n      body: JSON.stringify(basePayload)\n    });\n    const d = await r.json();\n    if(d.ok){\n      let recOk = 0;\n      for(const rec of recs){\n        const rr = await apiFetch('/adicionar', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(rec)});\n        const rd = await rr.json();\n        if(rd.ok) recOk++;\n      }\n      toast(recs.length ? `Salvo com ${recOk} recorrência(s) ✓` : 'Salvo na planilha ✓','ok');\n      document.getElementById('f-item').value = '';\n      document.getElementById('f-valor').value = '';\n      await loadData();\n    } else {\n      toast((d.erro||'').includes('Permission')?'Feche o arquivo no Excel antes de salvar.':d.erro||'Erro ao salvar.','err');\n    }\n  } catch {\n    toast('Servidor offline.','err');\n  } finally {\n    btn.disabled = false;\n    btn.innerHTML = 'Adicionar <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><polyline points=\"12 5 19 12 12 19\"/></svg>';\n  }\n}\n\nfunction renderCadTabela(){\n  document.getElementById('cad-cnt').textContent = allData.length+' registros';\n  let desp = 0, rec = 0;\n  allData.forEach(x => {\n    const v = Math.abs(parseFloat(x.valor)||0);\n    x.tipo === 'Receita' ? rec += v : desp += v;\n  });\n  const saldo = rec - desp;\n  document.getElementById('c-d').textContent = f(desp);\n  document.getElementById('c-r').textContent = f(rec);\n  document.getElementById('c-s').textContent = f(saldo);\n  document.getElementById('c-s-pfx').textContent = saldo < 0 ? '−R$' : 'R$';\n  const wrap = document.getElementById('c-s-wrap');\n  wrap.className = 'kpi-val ' + (saldo < 0 ? 'neg' : saldo > 0 ? 'pos' : '');\n  document.getElementById('c-d-sub').textContent = allData.filter(x=>x.tipo==='Despesa').length+' lançamentos';\n  document.getElementById('c-r-sub').textContent = allData.filter(x=>x.tipo==='Receita').length+' lançamentos';\n\n  const tb = document.getElementById('cad-tb');\n  if(!allData.length){\n    tb.innerHTML = '<tr><td colspan=\"6\" style=\"text-align:center;color:var(--tx3);padding:32px;font-family:var(--mono);font-size:12px\">Nenhuma movimentação.</td></tr>';\n    return;\n  }\n  tb.innerHTML = [...allData].reverse().slice(0,200).map(x => {\n    const isD = x.tipo !== 'Receita';\n    const c = gc(x.categoria);\n    const sitClass = x.situacao === 'Pago' ? 'pago' : x.situacao === 'Pendente' ? 'pend' : x.situacao === 'Agendado' ? 'agen' : '';\n    return `<tr>\n      <td class=\"td-date\">${x.data||''}</td>\n      <td>${x.fonte||''}</td>\n      <td class=\"td-item\">${x.item||''}</td>\n      <td><span class=\"pill\" style=\"background:${c}18;color:${c};border-color:${c}50\"><span class=\"dot\" style=\"background:${c}\"></span>${displayCat(x.categoria)}</span></td>\n      <td><span class=\"pill ${sitClass}\">${capLabel(x.situacao||'—')}</span></td>\n      <td class=\"${isD?'val-neg':'val-pos'}\">${isD?'−':'+'} R$ ${f(Math.abs(parseFloat(x.valor)||0))}</td>\n    </tr>`;\n  }).join('');\n}\n\n// ═══════════════ ORÇAMENTO ═══════════════\nlet orcMeses = [], orcLinhas = [], orcMesSel = null, orcChart = null;\n\nasync function loadOrcamentoData(){\n  try {\n    if(mockMode) throw new Error('mock');\n    const r = await apiFetch('/orcamento');\n    const d = await r.json();\n    if(!d.ok || !d.meses?.length) throw new Error('vazio');\n    orcMeses = d.meses;\n    orcLinhas = d.linhas;\n  } catch {\n    const m = generateMockOrcamento();\n    orcMeses = m.meses;\n    orcLinhas = m.linhas;\n  }\n}\n\nasync function initOrcamento(){\n  const el = document.getElementById('orc-cards');\n  if(el) el.innerHTML = '<div style=\"color:var(--tx3);font-family:var(--mono);font-size:12px;grid-column:1/-1;padding:18px\">Carregando orçamento…</div>';\n  await loadOrcamentoData();\n  // seleciona mês atual\n  const hoje = new Date();\n  const curSerial = Math.round((new Date(hoje.getFullYear(), hoje.getMonth(), 1) - new Date(1899,11,30))/86400000);\n  orcMesSel = orcMeses.find(m => m.serial === curSerial) || orcMeses[orcMeses.length-1];\n  buildOrcMesButtons();\n  renderOrcamento();\n}\n\nfunction buildOrcMesButtons(){\n  const row = document.getElementById('orc-mes-row');\n  if(!row) return;\n  row.innerHTML = orcMeses.map(m =>\n    `<button class=\"orc-mes-btn\" id=\"orcm-${m.serial}\" onclick=\"setOrcMes(${m.serial})\">${m.label}</button>`\n  ).join('');\n}\n\nfunction setOrcMes(serial){\n  orcMesSel = orcMeses.find(m => m.serial === serial) || orcMesSel;\n  renderOrcamento();\n}\n\nfunction serialToMonthInput(serial){\n  const d = new Date(1899,11,30);\n  d.setDate(d.getDate()+Number(serial));\n  if(isNaN(d.getTime())) return '';\n  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');\n}\nfunction monthInputToSerial(value){\n  if(!value) return null;\n  const [y,m] = value.split('-').map(Number);\n  if(!y || !m) return null;\n  return Math.round((new Date(y,m-1,1) - new Date(1899,11,30))/86400000);\n}\nfunction defaultNextBudgetMonth(){\n  const last = orcMeses.length ? orcMeses[orcMeses.length-1].serial : null;\n  if(last) {\n    const d = new Date(1899,11,30);\n    d.setDate(d.getDate()+Number(last));\n    d.setMonth(d.getMonth()+1);\n    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');\n  }\n  const now = new Date();\n  return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');\n}\nfunction monthPartsFromSerial(serial){\n  if(!serial) return null;\n  const d = new Date(1899,11,30);\n  d.setDate(d.getDate()+Number(serial));\n  if(isNaN(d.getTime())) return null;\n  return {y:d.getFullYear(), m:d.getMonth()};\n}\nfunction budgetProvisionForSerial(serial){\n  const target = monthPartsFromSerial(serial);\n  const result = {receita:0, cats:{}};\n  if(!target) return result;\n  allData.forEach(row => {\n    const pd = parseDate(row.data);\n    if(!pd || pd.y !== target.y || pd.m !== target.m) return;\n    const valor = Math.abs(parseFloat(row.valor)||0);\n    const tipo = String(row.tipo || '').toLowerCase();\n    if(tipo === 'receita'){\n      result.receita += valor;\n      return;\n    }\n    if(tipo !== 'despesa' || valor <= 0) return;\n    const cat = String(row.categoria || '').trim().toUpperCase();\n    if(!cat) return;\n    result.cats[cat] = (result.cats[cat] || 0) + valor;\n  });\n  return result;\n}\nfunction openOrcModal(){\n  if(!orcLinhas.length){ toast('Carregue o orçamento antes de cadastrar.', 'err'); return; }\n  const modal = document.getElementById('orc-modal');\n  const mes = document.getElementById('orc-form-mes');\n  mes.value = defaultNextBudgetMonth();\n  buildOrcForm();\n  updateOrcBudgetBalance();\n  modal.classList.add('on');\n}\nfunction closeOrcModal(){\n  document.getElementById('orc-modal')?.classList.remove('on');\n}\nfunction modalBackdropClose(e){\n  if(e.target?.id === 'orc-modal') closeOrcModal();\n}\nfunction buildOrcForm(){\n  const grid = document.getElementById('orc-form-grid');\n  if(!grid) return;\n  const serial = monthInputToSerial(document.getElementById('orc-form-mes')?.value || '');\n  const mi = serial ? orcMeses.findIndex(m => Number(m.serial) === Number(serial)) : -1;\n  const provisionado = budgetProvisionForSerial(serial);\n  const receitaInput = document.getElementById('orc-form-receita');\n  if(receitaInput){\n    const receitaAtual = mi >= 0 ? (orcMeses[mi]?.receita || 0) : 0;\n    receitaInput.value = receitaAtual > 0 ? receitaAtual : provisionado.receita > 0 ? provisionado.receita.toFixed(2) : '';\n  }\n  const groups = {};\n  orcLinhas.filter(l => l.cod !== 'RECEITAS').forEach(l => {\n    const grupo = l.grupo || 'OUTROS';\n    if(!groups[grupo]) groups[grupo] = [];\n    groups[grupo].push(l);\n  });\n  let html = '';\n  Object.keys(groups).forEach(grupo => {\n    html += '<div class=\"orc-form-group\">'+grupo+'</div>';\n    html += groups[grupo].map(l => {\n      const current = mi >= 0 ? (l.meses[mi]?.previsto || 0) : 0;\n      const provisionadoCat = provisionado.cats[String(l.cod || '').toUpperCase()] || 0;\n      const val = current > 0 ? current : provisionadoCat > 0 ? provisionadoCat.toFixed(2) : '';\n      const cor = GRUPOS_INVEST.has(l.grupo) ? '#f5b455' : gco(l.cod);\n      return '<div class=\"orc-budget-field\">'\n        + '<label><span class=\"dot\" style=\"background:'+cor+'\"></span>'+l.cod+'</label>'\n        + '<input inputmode=\"decimal\" type=\"number\" min=\"0\" step=\"0.01\" data-cat=\"'+l.cod+'\" value=\"'+val+'\" placeholder=\"0,00\" oninput=\"updateOrcBudgetBalance()\">'\n        + '</div>';\n    }).join('');\n  });\n  grid.innerHTML = html;\n  updateOrcBudgetBalance();\n}\nfunction clearOrcFormValues(){\n  document.querySelectorAll('#orc-form-grid input[data-cat]').forEach(i => i.value = '');\n  const receita = document.getElementById('orc-form-receita');\n  if(receita) receita.value = '';\n  updateOrcBudgetBalance();\n}\nfunction orcFormNumber(value){\n  return parseFloat(String(value || '').replace(',', '.')) || 0;\n}\nfunction currentOrcFormTotals(){\n  const receita = orcFormNumber(document.getElementById('orc-form-receita')?.value);\n  let previsto = 0;\n  document.querySelectorAll('#orc-form-grid input[data-cat]').forEach(input => { previsto += orcFormNumber(input.value); });\n  return {receita, previsto, saldo: receita - previsto};\n}\nfunction updateOrcBudgetBalance(){\n  const t = currentOrcFormTotals();\n  const receitaEl = document.getElementById('orc-bal-receita');\n  const prevEl = document.getElementById('orc-bal-prev');\n  const saldoEl = document.getElementById('orc-bal-saldo');\n  if(receitaEl) receitaEl.textContent = 'R$ '+f(t.receita);\n  if(prevEl) prevEl.textContent = 'R$ '+f(t.previsto);\n  if(saldoEl){\n    saldoEl.textContent = (t.saldo < 0 ? '-R$ ' : 'R$ ') + f(Math.abs(t.saldo));\n    saldoEl.className = t.saldo < 0 ? 'neg' : t.saldo > 0 ? 'pos' : '';\n  }\n}\nasync function salvarOrcamento(){\n  const mes = document.getElementById('orc-form-mes')?.value;\n  if(!mes){ toast('Informe o mês do orçamento.', 'err'); return; }\n  const totals = currentOrcFormTotals();\n  if(totals.receita <= 0){ toast('Informe a receita do mês.', 'err'); return; }\n  if(totals.previsto > totals.receita){ toast('As previsões passam da receita disponível.', 'err'); return; }\n  const valores = {};\n  document.querySelectorAll('#orc-form-grid input[data-cat]').forEach(input => {\n    const raw = String(input.value || '').replace(',', '.');\n    const val = parseFloat(raw);\n    if(!isNaN(val) && val > 0) valores[input.dataset.cat] = val;\n  });\n  if(!Object.keys(valores).length){ toast('Preencha ao menos um valor.', 'err'); return; }\n  if(mockMode){ toast('Cadastro indisponível no modo demo.', 'err'); return; }\n  const btn = document.getElementById('orc-save-btn');\n  btn.disabled = true; btn.textContent = 'Salvando…';\n  try {\n    const r = await apiFetch('/orcamento', {\n      method:'POST', headers:{'Content-Type':'application/json'},\n      body: JSON.stringify({mes, receita: totals.receita, valores})\n    });\n    const d = await r.json();\n    if(!d.ok) throw new Error(d.erro || 'Erro ao salvar orçamento.');\n    toast(d.mensagem || 'Orçamento salvo ✓', 'ok');\n    closeOrcModal();\n    await initOrcamento();\n    if(d.mes?.serial) setOrcMes(d.mes.serial);\n  } catch(err) {\n    toast(err.message || 'Erro ao salvar orçamento.', 'err');\n  } finally {\n    btn.disabled = false; btn.textContent = 'Salvar orçamento';\n  }\n}\ndocument.addEventListener('keydown', e => { if(e.key === 'Escape') closeOrcModal(); });\n\nfunction renderOrcamento(){\n  if(!orcMesSel || !orcMeses.length) return;\n  const mi = orcMeses.findIndex(m => m.serial === orcMesSel.serial);\n\n  orcMeses.forEach(m => {\n    const btn = document.getElementById('orcm-'+m.serial);\n    if(!btn) return;\n    btn.classList.toggle('on', m.serial === orcMesSel.serial);\n  });\n\n  document.getElementById('orc-titulo').textContent = orcMesSel.label.toUpperCase();\n\n  const linhas = orcLinhas.map(d => ({...d, mes: d.meses[mi] || {realizado:0, previsto:0, saldo:0}}));\n  const despesas = linhas.filter(l => !GRUPOS_INVEST.has(l.grupo));\n  const investimentos = linhas.filter(l => GRUPOS_INVEST.has(l.grupo));\n\n  const receitaMes = orcMesSel.receita || 0;\n  const totalR = despesas.reduce((s,l) => s + l.mes.realizado, 0);\n  const totalP = despesas.reduce((s,l) => s + l.mes.previsto, 0);\n  const totalS = totalP - totalR;\n  const saldoLivre = receitaMes - totalP;\n  const estouros = despesas.filter(l => l.mes.saldo < 0).length;\n  const totalInvR = investimentos.reduce((s,l) => s + l.mes.realizado, 0);\n  const totalInvP = investimentos.reduce((s,l) => s + l.mes.previsto, 0);\n  const pctGeral = totalP > 0 ? Math.round(totalR/totalP*100) : 0;\n\n  document.getElementById('orc-kpis').innerHTML = `\n    <div class=\"kpi pos\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Receita</div>\n      <div class=\"kpi-val pos\"><span class=\"pfx\">R$</span>${f(receitaMes)}</div>\n      <div class=\"kpi-sub\">base do orçamento · ${orcMesSel.label}</div>\n    </div>\n    <div class=\"kpi\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Previsto</div>\n      <div class=\"kpi-val\"><span class=\"pfx\">R$</span>${f(totalP)}</div>\n      <d
