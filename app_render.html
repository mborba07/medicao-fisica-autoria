iv class=\"kpi-sub\">${despesas.length} categorias</div>\n    </div>\n    <div class=\"kpi neg\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Realizado</div>\n      <div class=\"kpi-val neg\"><span class=\"pfx\">R$</span>${f(totalR)}</div>\n      <div class=\"kpi-sub\">${pctGeral}% do previsto · ${estouros} estouro${estouros!==1?'s':''}</div>\n    </div>\n    <div class=\"kpi ${saldoLivre >= 0 ? 'pos' : 'neg'}\">\n      <div class=\"kpi-tag\"><span class=\"accent\"></span>Saldo livre</div>\n      <div class=\"kpi-val ${saldoLivre >= 0 ? 'pos' : 'neg'}\"><span class=\"pfx\">${saldoLivre>=0?'R$':'−R$'}</span>${f(Math.abs(saldoLivre))}</div>\n      <div class=\"kpi-sub\">receita − previsões · inv. R$ ${f(totalInvP)}</div>\n    </div>\n  `;\n\n  // gráfico previsto vs realizado\n  const cats = despesas.filter(l => l.mes.previsto > 0 || l.mes.realizado > 0);\n  if(orcChart) orcChart.destroy();\n  orcChart = new Chart(document.getElementById('orcBarC'), {\n    type:'bar',\n    data:{\n      labels: cats.map(l => l.cod),\n      datasets:[\n        {\n          label:'Previsto', data: cats.map(l => l.mes.previsto),\n          backgroundColor:'rgba(91,141,255,.20)', borderColor:'#5b8dff',\n          borderWidth:1.5, borderRadius:3, borderSkipped:false,\n        },\n        {\n          label:'Realizado', data: cats.map(l => l.mes.realizado),\n          backgroundColor: cats.map(l => l.mes.saldo < 0 ? 'rgba(255,92,122,.75)' : 'rgba(77,216,154,.55)'),\n          borderColor: cats.map(l => l.mes.saldo < 0 ? '#ff5c7a' : '#4dd89a'),\n          borderWidth:0, borderRadius:3, borderSkipped:false,\n        }\n      ]\n    },\n    options:{\n      responsive:true, maintainAspectRatio:false,\n      plugins:{\n        legend:{labels:{\n          color:'#b6bcc8', font:{family:'JetBrains Mono', size:10, weight:'500'},\n          boxWidth:10, boxHeight:10, padding:14, usePointStyle:true, pointStyle:'rect'\n        }},\n        tooltip:{\n          backgroundColor:'#1a1d27', titleColor:'#e9ecf3', bodyColor:'#b6bcc8',\n          borderColor:'rgba(255,255,255,.09)', borderWidth:1, padding:10,\n          callbacks:{label: ctx => ' '+ctx.dataset.label+': R$ '+f(ctx.raw)}\n        }\n      },\n      scales:{\n        x:{grid:{display:false}, ticks:{color:'#8a8f9c', font:{family:'JetBrains Mono', size:10}}, border:{display:false}},\n        y:{grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#8a8f9c', font:{family:'JetBrains Mono', size:10}, callback: v => 'R$'+f0(v)}, border:{display:false}}\n      }\n    }\n  });\n\n  // cards\n  let cardsHTML = '';\n  if(despesas.length){\n    cardsHTML += `<div class=\"orc-section-lbl\">Despesas</div>`;\n    despesas.filter(l => l.mes.previsto > 0 || l.mes.realizado > 0).forEach(l => {\n      cardsHTML += renderOrcCard(l, false);\n    });\n  }\n  if(investimentos.length){\n    cardsHTML += `<div class=\"orc-section-lbl\">Investimentos</div>`;\n    investimentos.filter(l => l.mes.previsto > 0 || l.mes.realizado > 0).forEach(l => {\n      cardsHTML += renderOrcCard(l, true);\n    });\n  }\n  document.getElementById('orc-cards').innerHTML = cardsHTML;\n\n  // tabela\n  const tbody = document.getElementById('orc-tbody');\n  const renderGrupo = (lista, titulo) => {\n    if(!lista.length) return '';\n    let h = `<tr class=\"gr-row\"><td colspan=\"7\">${titulo}</td></tr>`;\n    h += lista.map(l => {\n      const over = l.mes.saldo < 0;\n      const pct = l.mes.previsto > 0 ? Math.round(l.mes.realizado/l.mes.previsto*100) : 0;\n      const status = over\n        ? `<span class=\"pill over-st\">estouro</span>`\n        : pct >= 80\n          ? `<span class=\"pill warn-st\">atenção · ${pct}%</span>`\n          : `<span class=\"pill ok-st\">ok · ${pct}%</span>`;\n      return `<tr>\n        <td style=\"color:var(--tx3)\">${l.grupo}</td>\n        <td><span style=\"font-family:var(--mono);font-size:10px;color:${gco(l.cod)};font-weight:600\">${l.cod}</span></td>\n        <td class=\"td-item\">${l.desc}</td>\n        <td class=\"r\">R$ ${f(l.mes.previsto)}</td>\n        <td class=\"r\" style=\"color:var(--neg2)\">R$ ${f(l.mes.realizado)}</td>\n        <td class=\"r\" style=\"font-weight:600;color:${over?'var(--neg2)':'var(--pos2)'}\">${over?'−':'+'} R$ ${f(Math.abs(l.mes.saldo))}</td>\n        <td>${status}</td>\n      </tr>`;\n    }).join('');\n    return h;\n  };\n  tbody.innerHTML = renderGrupo(despesas, 'Despesas') + renderGrupo(investimentos, 'Investimentos');\n}\n\nfunction renderOrcCard(l, isInv){\n  const pct = l.mes.previsto > 0 ? Math.round(l.mes.realizado/l.mes.previsto*100) : 0;\n  const over = l.mes.saldo < 0;\n  const warn = !over && pct >= 80;\n  const cor = isInv ? '#f5b455' : gco(l.cod);\n  const barClass = isInv ? 'inv' : over ? 'over' : warn ? 'warn' : 'ok';\n  const pctClass = over ? 'over' : warn ? 'warn' : '';\n  return `<div class=\"orc-card ${over?'over-budget':warn?'warn-budget':''}\">\n    <div class=\"orc-card-hdr\">\n      <div>\n        <div class=\"orc-card-cod\" style=\"color:${cor}\">${l.cod}</div>\n        <div class=\"orc-card-desc\">${l.desc}</div>\n      </div>\n      <div class=\"orc-card-pct ${pctClass}\">${pct}%</div>\n    </div>\n    <div class=\"orc-bar-track\">\n      <div class=\"orc-bar-fill ${barClass}\" style=\"width:${Math.min(pct,100)}%\"></div>\n    </div>\n    <div class=\"orc-card-foot\">\n      <span class=\"actual\">R$ ${f(l.mes.realizado)} <span class=\"planned\">/ R$ ${f(l.mes.previsto)}</span></span>\n      <span class=\"saldo ${over?'over':'ok'}\">${over?'−':'+'} R$ ${f(Math.abs(l.mes.saldo))}</span>\n    </div>\n  </div>`;\n}\n\n// ═══════════════ ALERTAS ═══════════════\nfunction buildEstouros(rows){\n  const el = document.getElementById('dash-alertas');\n  if(!el) return;\n  if(!orcLinhas.length || !orcMeses.length){ el.style.display = 'none'; el.classList.remove('on'); return; }\n\n  let targetY = CUR_Y, targetM = CUR_M;\n  if(dashMesSel && typeof dashMesSel === 'object' && dashMesSel.y != null){ targetY = dashMesSel.y; targetM = dashMesSel.m; }\n\n  const gastos = {};\n  dashRows.forEach(r => {\n    if(!r.pd || r.pd.y !== targetY || r.pd.m !== targetM) return;\n    gastos[r.categoria] = (gastos[r.categoria]||0) + (parseFloat(r.valor)||0);\n  });\n\n  const mi = orcMeses.findIndex(m => {\n    const d = new Date(1899,11,30);\n    d.setDate(d.getDate()+Number(m.serial));\n    return d.getFullYear() === targetY && d.getMonth() === targetM;\n  });\n  if(mi < 0){ el.style.display = 'none'; el.classList.remove('on'); return; }\n\n  const alerts = [];\n  orcLinhas.filter(l => !GRUPOS_INVEST.has(l.grupo)).forEach(l => {\n    const gasto = gastos[l.cod] || 0;\n    const prev = l.meses[mi]?.previsto || 0;\n    if(prev <= 0) return;\n    const pct = gasto / prev;\n    if(gasto > prev) alerts.push({level:'over', cod:l.cod, gasto, prev, delta:gasto-prev});\n    else if(pct >= .8) alerts.push({level:'warn', cod:l.cod, gasto, prev, delta:prev-gasto});\n  });\n  alerts.sort((a,b) => (b.gasto/b.prev) - (a.gasto/a.prev));\n  if(!alerts.length){ el.style.display = 'none'; el.classList.remove('on'); return; }\n  el.style.display = 'flex';\n  el.classList.add('on');\n  el.innerHTML = '<span class=\"alert-title\">Alertas mensais</span>' + alerts.slice(0,6).map(a => `\n    <div class=\"alert ${a.level === 'warn' ? 'warn' : ''}\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"/><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"/><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"/></svg>\n      <span class=\"cat\">${displayCat(a.cod)}</span>\n      <span class=\"vals\">R$ ${f0(a.gasto)} / R$ ${f0(a.prev)}</span>\n      <span class=\"over\">${a.level === 'over' ? '+' : 'restam '}R$ ${f0(a.delta)}</span>\n    </div>\n  `).join('');\n}\n\n// ═══════════════ CONFIGURAÇÕES ═══════════════\nfunction setThemeMode(mode){\n  const light = mode === 'light';\n  document.body.classList.toggle('theme-light', light);\n  localStorage.setItem('desembolso-theme', light ? 'light' : 'dark');\n  const btn = document.getElementById('theme-toggle');\n  if(btn) btn.textContent = light ? 'Modo Escuro' : 'Modo Claro';\n}\nfunction initThemeMode(){\n  setThemeMode(localStorage.getItem('desembolso-theme') || 'dark');\n}\nfunction toggleThemeMode(){\n  setThemeMode(document.body.classList.contains('theme-light') ? 'dark' : 'light');\n}\nasync function baixarArquivo(endpoint, btnId, outId, loading, fallbackName, successMsg){\n  const btn = document.getElementById(btnId);\n  const out = document.getElementById(outId);\n  if(!btn || !out) return;\n  if(mockMode){ out.innerHTML = '<span class=\"err\">Exportação indisponível no modo demo.</span>'; return; }\n  btn.disabled = true;\n  out.textContent = loading;\n  try {\n    const r = await apiFetch(endpoint, {method:'POST'});\n    const ct = r.headers.get('content-type') || '';\n    if(!r.ok){\n      let msg = 'Erro ao exportar.';\n      if(ct.includes('application/json')){ const d = await r.json(); msg = d.erro || msg; }\n      else { msg = await r.text() || msg; }\n      out.innerHTML = '<span class=\"err\">'+msg+'</span>'; toast(msg,'err'); return;\n    }\n    const blob = await r.blob();\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    const disposition = r.headers.get('content-disposition') || '';\n    const match = disposition.match(/filename\\*?=(?:UTF-8''|\")?([^\";]+)/i);\n    a.href = url;\n    a.download = match ? decodeURIComponent(match[1].replace(/\"/g,'')) : fallbackName;\n    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);\n    out.textContent = successMsg;\n    toast(successMsg,'ok');\n  } catch(err) {\n    const msg = err.message || 'Erro ao exportar.';\n    out.innerHTML = '<span class=\"err\">'+msg+'</span>'; toast(msg,'err');\n  } finally { btn.disabled = false; }\n}\nasync function exportarPdfExecutivo(){\n  return baixarArquivo('/exportar_pdf', 'pdf-btn', 'pdf-result', 'Gerando PDF…', 'Controle_Financeiro_Executivo.pdf', 'PDF executivo gerado ✓');\n}\nasync function exportarPlanilha(){\n  return baixarArquivo('/exportar', 'export-btn', 'export-result', 'Gerando arquivo…', 'Desembolso_Estruturado.xlsx', 'Arquivo Excel gerado ✓');\n}\n\n// ═══════════════ INIT ═══════════════\ninitThemeMode();\ncheckSrv().then(() => {\n  const now = new Date();\n  const label = now.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})\n    + ' · '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});\n  const el = document.getElementById('last-upd');\n  if(el) el.textContent = 'atualizado em '+label;\n});\n\n<\/script>\n\n\n</body></html>"</script>
